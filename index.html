<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#000d0e">
<meta name="mobile-web-app-capable" content="yes">
<title>Nueva página</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after {
box-sizing: border-box;
margin: 0;
padding: 0;
}
:root{
--primary:#009ca4;
--primary-glow:rgba(0,156,164,0.55);
--orange:#F7941D;
--magenta:#EC008C;
--bg:#000d0e;
--text:#ff7b00;
}
body{
font-family:'Montserrat',sans-serif;
background:var(--bg);
min-height:100vh;
padding:16px 16px 48px;
display:flex;
flex-direction:column;
align-items:center;
overflow-x:hidden;
position:relative;
}
/* blobs decorativos */
body::before{
content:'';
position:fixed;
width:420px;
height:420px;
border-radius:50%;
background:radial-gradient(circle,var(--primary),transparent 65%);
top:-130px;
left:-110px;
opacity:0.18;
}
body::after{
content:'';
position:fixed;
width:300px;
height:300px;
border-radius:50%;
background:radial-gradient(circle,var(--primary),transparent 65%);
bottom:-90px;
right:-80px;
opacity:0.10;
}
.logo-area{
margin-bottom:20px;
text-align:center;
}
.logo-area img{
max-width:150px;
width:100%;
height:auto;
filter:drop-shadow(0 0 16px var(--primary-glow));
}
.container{
background:rgba(0,18,20,0.82);
border:1px solid rgba(0,156,164,0.30);
backdrop-filter:blur(24px);
border-radius:26px;
padding:0 22px 36px;
max-width:480px;
width:100%;
box-shadow:
0 16px 50px rgba(0,156,164,0.14),
0 40px 90px rgba(0,0,0,0.70);
text-align:center;
}
.container::before{
content:'';
display:block;
height:3px;
background:linear-gradient(90deg,var(--primary),rgba(247,148,29,0.6));
border-radius:26px 26px 0 0;
margin:0 -22px 30px;
}
h1{
font-size:20px;
font-weight:800;
letter-spacing:1px;
color:var(--text);
}
h2{
font-size:16px;
font-weight:800;
letter-spacing:1px;
color:var(--primary);
margin-bottom:5px;
}
.img-footer{
max-width:100%;
height:105px;
border-radius:16px;
display:block;
margin:0 auto;
}
.color-strip{
display:flex;
gap:6px;
justify-content:center;
margin-top:36px;
}
.color-strip span{
height:3px;
border-radius:999px;
flex:1;
max-width:56px;
}
.cs-teal{background:#009ca4;opacity:.9;}
.cs-teal2{background:#009ca4;opacity:.6;}
.cs-orange{background:#F7941D;opacity:.4;}
.cs-magenta{background:#EC008C;opacity:.3;}
/* ANIMACION SOLO DEL HALO */
@keyframes haloBreathing{
0%{
box-shadow:
0 0 10px rgba(0,156,164,0.35),
0 0 20px rgba(0,156,164,0.25);
}
50%{
box-shadow:
0 0 24px rgba(0,156,164,0.75),
0 0 46px rgba(0,156,164,0.55);
}
100%{
box-shadow:
0 0 10px rgba(0,156,164,0.35),
0 0 20px rgba(0,156,164,0.25);
}
}
/* BOTON */
.btn-primary{
display:inline-flex;
align-items:center;
justify-content:center;
width:100%;
max-width:320px;
margin:0 auto 35px auto;
background:linear-gradient(135deg,var(--primary),#007a82);
border:none;
color:#ffffff;
padding:16px 28px;
border-radius:14px;
text-decoration:none;
font-weight:700;
letter-spacing:2px;
font-size:25px;
animation:haloBreathing 3s ease-in-out infinite;
}
.btn-primary:hover{
background:linear-gradient(135deg,#00b1ba,var(--primary));
}
/* ── ESTILOS AGREGADOS: Tarjetas de video ── */
.video-preview {
position: relative;
border-radius: 16px;
margin-bottom: 26px;
overflow: hidden;
border: 1px solid rgba(0,156,164,0.22);
background: rgba(0,156,164,0.04);
transition: border-color 0.22s ease, box-shadow 0.22s ease;
}
.video-preview:last-of-type { margin-bottom: 26px; }
.video-preview:hover {
border-color: rgba(0,156,164,0.50);
box-shadow: 0 8px 32px rgba(0,156,164,0.18);
}
/* ── Imagen de preview ── */
.video-preview > img {
width: 100%;
height: auto;
border-radius: 12px;
display: block;
}
/* ── Botón ▶ superpuesto en el centro ── */
.play-button {
position: absolute;
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
background: rgba(0, 0, 0, 0.6);
border: none;
border-radius: 50%;
width: 70px;
height: 70px;
display: flex;
align-items: center;
justify-content: center;
cursor: pointer;
transition: background 0.3s ease;
}
.play-button:hover {
background: rgba(0, 0, 0, 0.8);
}
.play-button svg {
fill: white;
width: 32px;
height: 32px;
}
/* ── Video ── */
video {
display: none;
width: 100%;
border-radius: 13px;
outline: none;
background: #000;
}
</style>
</head>
<body>
<div class="logo-area">
<img src="izzi.png" alt="logo izzi"><br>
</div>
<div class="container">
<h1>RETO</h1><br>
<h1>¡DINOS!</h1>
<h1>¿TU COMO LO HACES?</h1><br><br>
<h2>OBSERVE EL VIDEO</h2><br>
<h2>POSTERIORMENTE PRESIONE EL BOTON PARA LLENAR EL FORMULARIO Y SEGUIR INSTRUCCIONES</h2><br><br>
<!-- VIDEO 1 -->
<div class="video-preview">
<img src="1.png" alt="Vista previa del video" id="previewImg1" loading="lazy">
<button class="play-button" onclick="reproducirVideo(1)">
<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
</button>
<video id="video1" src="1.mp4" controls controlsList="nodownload noplaybackrate nomute" disablePictureInPicture></video>
</div>
<br>
<a href="https://forms.office.com/Pages/ResponsePage.aspx?id=4kLKykqtGU2CTD_zcJvYQHlO6vDp04lHv55iyY8UaPRUQVI5Vlg0VFhKME82QVNWV0kwSkM4RlhOViQlQCNjPTEu" class="btn-primary">FORMULARIO</a><br><br>
<img src="ret.png" alt="imagen" class="img-footer">
<div class="color-strip">
<span class="cs-teal"></span>
<span class="cs-teal2"></span>
<span class="cs-orange"></span>
<span class="cs-magenta"></span>
</div>
</div>
<!-- SCRIPT DEL VIDEO -->
<script>
function reproducirVideo(num) {
const video      = document.getElementById('video' + num);
const previewImg = document.getElementById('previewImg' + num);
const playBtn    = previewImg.parentElement.querySelector('.play-button');
previewImg.style.display = 'none';
playBtn.style.display    = 'none';
video.style.display      = 'block';
video.play();
}
document.querySelectorAll('video').forEach(function(video) {
video.addEventListener('contextmenu', function(e) {
e.preventDefault();
});
});
</script>
</body>
</html>
